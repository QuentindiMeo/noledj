<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noledj — Avancement</title>
    <style>
      :root {
        --bg: #080810;
        --surface: #0f0f1c;
        --card: #14142a;
        --border: #1f1f3a;
        --text: #e8eaf6;
        --muted: #6b7280;
        --dim: #374151;
        --success: #10b981;
        --gold: #fbbf24;
        --c1: #8b5cf6;
        --c2: #6366f1;
        --c3: #0ea5e9;
        --c4: #f59e0b;
        --c5: #f97316;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        line-height: 1.5;
        padding: 20px;
        max-width: 860px;
        margin: 0 auto;
      }

      /* HEADER */
      .header {
        text-align: center;
        padding: 32px 0 16px;
      }
      .header h1 {
        font-size: 1.7rem;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .header p {
        color: var(--muted);
        margin-top: 4px;
        font-size: 0.85rem;
      }
      .global-bar-wrap {
        margin: 16px 0 0;
        background: var(--border);
        border-radius: 999px;
        height: 10px;
        overflow: hidden;
      }
      .global-bar {
        height: 100%;
        background: linear-gradient(
          90deg,
          #8b5cf6,
          #6366f1,
          #0ea5e9,
          #f59e0b,
          #f97316
        );
        border-radius: 999px;
        transition: width 0.5s ease;
      }
      .global-pct {
        text-align: right;
        font-size: 0.72rem;
        color: var(--muted);
        margin-top: 4px;
      }

      /* STATS */
      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin: 20px 0;
      }
      .stat {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .stat-value {
        font-size: 1.5rem;
        font-weight: 700;
        line-height: 1;
      }
      .stat-label {
        font-size: 0.67rem;
        color: var(--muted);
        margin-top: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* INDICATOR */
      .indicator {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 18px;
        margin: 0 0 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .indicator-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
      }
      .indicator-val {
        font-size: 1.1rem;
        font-weight: 700;
      }
      .indicator-msg {
        font-size: 0.8rem;
        margin-left: auto;
        font-weight: 600;
      }
      .ok {
        color: var(--success);
      }
      .warn {
        color: var(--gold);
      }
      .bad {
        color: #ef4444;
      }

      /* MILESTONES */
      .milestones-section {
        margin: 0 0 24px;
      }
      .section-title {
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
        margin-bottom: 12px;
      }
      .milestones-row {
        display: flex;
        align-items: flex-start;
        position: relative;
        padding: 0 16px;
      }
      .milestones-row::before {
        content: "";
        position: absolute;
        top: 15px;
        left: 36px;
        right: 36px;
        height: 2px;
        background: var(--border);
        z-index: 0;
      }
      .milestone {
        flex: 1;
        text-align: center;
        position: relative;
        z-index: 1;
      }
      .m-dot {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: var(--dim);
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
        font-size: 0.75rem;
        font-weight: 700;
        transition: all 0.3s;
      }
      .milestone.done .m-dot {
        background: var(--gold);
        border-color: var(--gold);
        color: #000;
        box-shadow: 0 0 14px rgba(251, 191, 36, 0.45);
      }
      .m-label {
        font-size: 0.62rem;
        color: var(--muted);
        margin-top: 6px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .m-date {
        font-size: 0.65rem;
        color: var(--muted);
        margin-top: 1px;
      }
      .milestone.done .m-label {
        color: var(--gold);
      }

      /* PHASES */
      .phases {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .phase {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
      }
      .phase-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 15px 18px;
        cursor: pointer;
        user-select: none;
      }
      .phase-accent {
        width: 5px;
        height: 38px;
        border-radius: 3px;
        flex-shrink: 0;
      }
      .phase-info {
        flex: 1;
        min-width: 0;
      }
      .phase-name {
        font-weight: 600;
        font-size: 0.92rem;
      }
      .phase-meta {
        font-size: 0.72rem;
        color: var(--muted);
        margin-top: 2px;
      }
      .phase-prog-wrap {
        flex: 1;
        max-width: 160px;
      }
      .phase-bar {
        background: var(--border);
        border-radius: 999px;
        height: 5px;
        overflow: hidden;
      }
      .phase-bar-fill {
        height: 100%;
        border-radius: 999px;
        transition: width 0.4s;
      }
      .phase-pct {
        font-size: 0.67rem;
        color: var(--muted);
        text-align: right;
        margin-top: 2px;
      }
      .phase-chevron {
        color: var(--muted);
        font-size: 0.75rem;
        transition: transform 0.2s;
        flex-shrink: 0;
      }
      .phase.open .phase-chevron {
        transform: rotate(180deg);
      }
      .phase-body {
        display: none;
        padding: 4px 18px 16px;
        border-top: 1px solid var(--border);
      }
      .phase.open .phase-body {
        display: block;
      }

      /* WEEK */
      .week {
        margin-top: 14px;
      }
      .week-header {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 6px;
        cursor: pointer;
      }
      .week-num {
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
      }
      .week-topic {
        font-size: 0.82rem;
        font-weight: 600;
      }
      .week-dates {
        font-size: 0.7rem;
        color: var(--muted);
        margin-left: auto;
      }
      .week-chevron {
        color: var(--muted);
        font-size: 0.7rem;
        transition: transform 0.2s;
        flex-shrink: 0;
      }
      .week.open .week-chevron {
        transform: rotate(180deg);
      }
      .week-body {
        display: none;
      }
      .week.open .week-body {
        display: block;
      }

      /* SESSIONS */
      .session {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 8px;
        margin-bottom: 3px;
        transition: background 0.12s;
        border-left: 3px solid transparent;
      }
      .session:hover {
        background: var(--surface);
      }
      .session.today {
        border-left-color: var(--gold);
        background: rgba(251, 191, 36, 0.04);
      }
      .session.done {
        opacity: 0.45;
      }
      .session input[type="checkbox"] {
        width: 17px;
        height: 17px;
        margin-top: 3px;
        flex-shrink: 0;
        accent-color: var(--success);
        cursor: pointer;
      }
      .s-day {
        font-size: 0.76rem;
        font-weight: 600;
        color: var(--text);
        min-width: 84px;
      }
      .session.today .s-day {
        color: var(--gold);
      }
      .s-body {
        flex: 1;
        min-width: 0;
      }
      .s-row1 {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .s-label {
        font-size: 0.8rem;
        font-weight: 500;
      }
      .s-today-badge {
        font-size: 0.6rem;
        background: var(--gold);
        color: #000;
        border-radius: 4px;
        padding: 1px 5px;
        font-weight: 700;
      }
      .s-hours {
        font-size: 0.67rem;
        background: var(--border);
        border-radius: 4px;
        padding: 1px 5px;
        font-weight: 600;
        margin-left: auto;
      }
      .s-actual {
        width: 2rem;
        font-size: 0.72rem;
        font-weight: 600;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 4px;
        padding: 2px 6px;
        text-align: right;
        font-family: inherit;
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .s-actual::-webkit-outer-spin-button,
      .s-actual::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .s-actual:focus {
        outline: none;
        border-color: var(--c2);
      }
      .s-actual.over {
        border-color: var(--c5);
        color: var(--c5);
      }
      .s-actual.under {
        border-color: var(--success);
        color: var(--success);
      }
      .s-actual-label {
        font-size: 0.6rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .s-details {
        font-size: 0.7rem;
        color: var(--muted);
        margin-top: 2px;
      }
      .s-label-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 1px;
      }
      .s-open {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        border-radius: 5px;
        font-size: 0.78rem;
        text-decoration: none;
        cursor: pointer;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--muted);
        transition: all 0.15s;
      }
      .s-open:hover {
        background: var(--card);
        border-color: var(--c2);
        color: var(--text);
      }
      .stat-sub {
        font-size: 0.62rem;
        color: var(--muted);
        margin-top: 3px;
        font-weight: 500;
      }
      .stat-sub b {
        color: var(--text);
        font-weight: 700;
      }

      /* COURSE MODAL */
      .modal {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: none;
      }
      .modal.open {
        display: block;
      }
      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(4, 4, 10, 0.78);
        backdrop-filter: blur(4px);
      }
      .modal-card {
        position: relative;
        margin: 4vh auto;
        width: min(880px, 94vw);
        max-height: 92vh;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
      }
      .modal-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
      }
      .modal-title {
        font-size: 0.95rem;
        font-weight: 700;
        flex: 1;
        min-width: 0;
      }
      .modal-close {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 8px;
        width: 30px;
        height: 30px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.15s;
      }
      .modal-close:hover {
        border-color: #ef4444;
        color: #ef4444;
      }
      .modal-tabs {
        display: flex;
        gap: 4px;
        padding: 8px 12px;
        flex-wrap: wrap;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .modal-tabs:empty {
        display: none;
      }
      .modal-tab {
        background: none;
        border: 1px solid transparent;
        color: var(--muted);
        border-radius: 6px;
        padding: 5px 10px;
        font-size: 0.72rem;
        cursor: pointer;
        font-family: inherit;
        font-weight: 600;
        transition: all 0.12s;
      }
      .modal-tab:hover {
        color: var(--text);
      }
      .modal-tab.active {
        background: var(--card);
        border-color: var(--border);
        color: var(--text);
      }
      .modal-body {
        flex: 1;
        overflow-y: auto;
        padding: 22px 28px 32px;
      }
      .modal-body.empty {
        color: var(--muted);
        font-style: italic;
      }

      /* MARKDOWN */
      .md h1,
      .md h2,
      .md h3,
      .md h4,
      .md h5,
      .md h6 {
        color: var(--text);
        font-weight: 700;
        line-height: 1.25;
        margin: 1.4em 0 0.6em;
      }
      .md h1 {
        font-size: 1.4rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 8px;
        margin-top: 0.3em;
      }
      .md h2 {
        font-size: 1.15rem;
        color: var(--c2);
      }
      .md h3 {
        font-size: 1rem;
      }
      .md h4 {
        font-size: 0.92rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .md p {
        margin: 0.7em 0;
        font-size: 0.88rem;
        line-height: 1.65;
      }
      .md ul,
      .md ol {
        margin: 0.7em 0;
        padding-left: 1.6em;
      }
      .md li {
        font-size: 0.88rem;
        line-height: 1.6;
        margin: 0.25em 0;
      }
      .md li > ul,
      .md li > ol {
        margin: 0.2em 0;
      }
      .md strong {
        color: var(--text);
        font-weight: 700;
      }
      .md em {
        color: var(--text);
        font-style: italic;
      }
      .md a {
        color: var(--c3);
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .md a:hover {
        color: var(--c2);
      }
      .md hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 1.6em 0;
      }
      .md code {
        font-family: "JetBrains Mono", "Consolas", monospace;
        font-size: 0.82em;
        background: var(--surface);
        padding: 1px 5px;
        border-radius: 4px;
        color: var(--c4);
        border: 1px solid var(--border);
      }
      .md pre {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        overflow-x: auto;
        margin: 0.9em 0;
        font-size: 0.82rem;
        line-height: 1.55;
      }
      .md pre code {
        background: none;
        border: none;
        padding: 0;
        color: var(--text);
        font-size: inherit;
      }
      .md blockquote {
        margin: 0.9em 0;
        padding: 6px 14px;
        border-left: 3px solid var(--c2);
        background: var(--surface);
        border-radius: 0 6px 6px 0;
        font-size: 0.86rem;
        color: var(--muted);
      }
      .md table {
        width: 100%;
        border-collapse: collapse;
        margin: 0.9em 0;
        font-size: 0.82rem;
      }
      .md th,
      .md td {
        border: 1px solid var(--border);
        padding: 6px 10px;
        text-align: left;
      }
      .md th {
        background: var(--surface);
        font-weight: 700;
      }

      /* MILESTONE CARD inside phase */
      .phase-milestone {
        margin-top: 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        transition:
          border-color 0.3s,
          background 0.3s;
      }
      .phase-milestone.unlocked {
        border-color: var(--gold);
        background: rgba(251, 191, 36, 0.05);
      }
      .pm-icon {
        font-size: 1.3rem;
      }
      .pm-info {
        flex: 1;
        min-width: 0;
      }
      .pm-title {
        font-size: 0.82rem;
        font-weight: 700;
      }
      .pm-skills {
        font-size: 0.68rem;
        color: var(--muted);
        margin-top: 2px;
      }
      .pm-status {
        font-size: 0.68rem;
        font-weight: 700;
        white-space: nowrap;
      }
      .phase-milestone.unlocked .pm-status {
        color: var(--gold);
      }
      .phase-milestone:not(.unlocked) .pm-status {
        color: var(--dim);
      }

      /* FOOTER */
      .footer {
        text-align: center;
        margin-top: 28px;
        padding-top: 14px;
        border-top: 1px solid var(--border);
      }
      .btn-reset {
        background: none;
        border: 1px solid var(--dim);
        color: var(--muted);
        border-radius: 8px;
        padding: 6px 16px;
        font-size: 0.72rem;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-reset:hover {
        border-color: #ef4444;
        color: #ef4444;
      }
      .footer-note {
        font-size: 0.65rem;
        color: var(--dim);
        margin-top: 8px;
      }

      /* IMPORT / EXPORT PILLS — fixed to the top-right of the viewport */
      .io-pills {
        position: fixed;
        top: 12px;
        right: 12px;
        display: flex;
        gap: 6px;
        z-index: 100;
      }
      .io-pill {
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 999px;
        padding: 6px 14px;
        font-size: 0.72rem;
        cursor: pointer;
        transition: all 0.15s;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      }
      .io-pill:hover {
        border-color: var(--gold);
        color: var(--text);
      }
      /* JUMP-TO-NEXT-LESSON — sticky, just below the import/export pills */
      .jump-nav {
        position: fixed;
        top: 48px;
        right: 12px;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
      }
      .jump-pill {
        border-color: var(--gold);
        color: var(--text);
      }

      /* CONFETTI */
      .confetti-wrap {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 9999;
        overflow: hidden;
      }
      .cp {
        position: absolute;
        animation: cpfall linear forwards;
        border-radius: 2px;
      }
      @keyframes cpfall {
        0% {
          transform: translateY(-20px) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(110vh) rotate(720deg);
          opacity: 0;
        }
      }

      @media (max-width: 580px) {
        .stats {
          grid-template-columns: repeat(2, 1fr);
        }
        .milestones-row::before {
          left: 16px;
          right: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="io-pills">
      <button
        class="io-pill"
        onclick="exportProgress()"
        title="Télécharger la progression dans un fichier JSON"
      >
        📤 Exporter
      </button>
      <button
        class="io-pill"
        onclick="document.getElementById('import-file').click()"
        title="Charger la progression depuis un fichier JSON"
      >
        📥 Importer
      </button>
      <input
        type="file"
        id="import-file"
        accept="application/json,.json"
        hidden
      />
    </div>
    <div class="jump-nav">
      <button
        class="io-pill jump-pill"
        onclick="scrollToNextLesson()"
        title="Aller à la prochaine leçon non terminée"
      >
        ⤵ Prochaine leçon
      </button>
      <button
        id="expand-all-btn"
        class="io-pill"
        onclick="toggleExpandAll()"
        title="Déplier ou replier toutes les phases et semaines"
      >
        ▾ Tout déplier
      </button>
    </div>

    <div id="app"></div>
    <div id="confetti-wrap" class="confetti-wrap"></div>

    <div id="course-modal" class="modal" aria-hidden="true">
      <div class="modal-backdrop" data-modal-close></div>
      <div
        class="modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="course-modal-title"
      >
        <div class="modal-header">
          <div class="modal-title" id="course-modal-title"></div>
          <button class="modal-close" data-modal-close aria-label="Fermer">
            ✕
          </button>
        </div>
        <div class="modal-tabs" id="course-modal-tabs"></div>
        <div class="modal-body md" id="course-modal-body"></div>
      </div>
    </div>

    <script>
      const COURSES = {
        s01: [
          {
            title: "M1 — Audit Python et plan de remédiation",
            path: "cours/priorite0/Python/Module-01.md",
          },
          {
            title: "M2 — Modèle de classe avancé",
            path: "cours/priorite0/Python/Module-02.md",

      const TOTAL_HOURS = 312;

      const LS_KEY = "noledj_v1";

      function scrollToNextLesson() {
        const sid = firstUncheckedSid(load());
        if (!sid) return; // everything done — nothing to scroll to

        const el = document.getElementById("sess-" + sid);
        if (!el) return;

        el.closest(".week")?.classList.add("open");
        el.closest(".phase")?.classList.add("open");
        requestAnimationFrame(() =>
          el.scrollIntoView({ behavior: "smooth", block: "center" }),
        );
      }

      function toggleExpandAll() {
        const groups = document.querySelectorAll(".phase, .week");
        const anyClosed = [...groups].some(
          (g) => !g.classList.contains("open"),
        );
        groups.forEach((g) => g.classList.toggle("open", anyClosed));
        const btn = document.getElementById("expand-all-btn");
        if (btn)
          btn.textContent = anyClosed ? "▴ Tout replier" : "▾ Tout déplier";
      }

      function load() {
        try {
          return JSON.parse(localStorage.getItem(LS_KEY) || "{}");
        } catch {
          return {};
        }
      }
      function save(state) {
        localStorage.setItem(LS_KEY, JSON.stringify(state));
      }

      function allSessions(phase) {
        return phase.weeks.flatMap((w) => w.sessions);
      }

      function actualKey(sid) {
        return "h_" + sid;
      }
      function getActual(state, sid) {
        const v = state[actualKey(sid)];
        return typeof v === "number" && isFinite(v) && v >= 0 ? v : null;
      }

      function getStats(state) {
        let hours = 0,
          actual = 0,
          actualEntered = 0,
          sessions = 0,
          total = 0;
        for (const phase of PHASES) {
          for (const s of allSessions(phase)) {
            total++;
            if (state[s.id]) {
              hours += s.hours;
              sessions++;
            }
            const a = getActual(state, s.id);
            if (a !== null) {
              actual += a;
              actualEntered++;
            }
          }
        }
        return { hours, actual, actualEntered, sessions, total };
      }

      function isPhaseComplete(phase, state) {
        return allSessions(phase).every((s) => state[s.id]);
      }

      function getCurrentWeek() {
        const now = new Date();
        const start = new Date("2026-06-01");
        const days = Math.max(0, Math.floor((now - start) / 86400000));
        return Math.min(20, Math.floor(days / 7) + 1);
      }

      function getExpectedHours() {
        const now = new Date();
        const start = new Date("2026-06-01");
        const days = Math.max(0, Math.floor((now - start) / 86400000));
        const completedWeeks = Math.floor(days / 7);
        return Math.min(completedWeeks * 16, TOTAL_HOURS);
      }

      function isToday(isoDate) {
        return isoDate === new Date().toISOString().slice(0, 10);
      }

      function confetti() {
        const wrap = document.getElementById("confetti-wrap");
        const colors = [
          "#8b5cf6",
          "#6366f1",
          "#0ea5e9",
          "#f59e0b",
          "#10b981",
          "#fbbf24",
          "#f97316",
        ];
        for (let i = 0; i < 70; i++) {
          const el = document.createElement("div");
          el.className = "cp";
          const size = 4 + Math.random() * 8;
          el.style.cssText = `
            left:${Math.random() * 100}%;top:-12px;
            width:${size}px;height:${size}px;
            background:${colors[Math.floor(Math.random() * colors.length)]};
            animation-delay:${Math.random() * 0.6}s;
            animation-duration:${1.4 + Math.random() * 1.6}s;
          `;
          wrap.appendChild(el);
          setTimeout(() => el.remove(), 3200);
        }
      }

      function render() {
        const state = load();
        const stats = getStats(state);
        const pct = Math.round((stats.hours / TOTAL_HOURS) * 100);
        const curWeek = getCurrentWeek();
        const expected = getExpectedHours();
        const delta = stats.hours - expected;

        let deltaCls, deltaMsg;
        if (delta >= 0) {
          deltaCls = "ok";
          deltaMsg = `+${delta} h d'avance`;
        } else if (delta >= -10) {
          deltaCls = "warn";
          deltaMsg = `${Math.abs(delta)} h de retard — rattrapable`;
        } else {
          deltaCls = "bad";
          deltaMsg = `${Math.abs(delta)} h de retard — compresser les mini-projets`;
        }

        document.getElementById("app").innerHTML =
          `
            <div class="header">
              <h1>Noledj — Tableau de bord</h1>
              <p>1ᵉʳ juin → 15 octobre 2026 &nbsp;·&nbsp; 20 semaines · 5 phases · 5 jalons</p>
              <div class="global-bar-wrap"><div class="global-bar" style=\"width:` +
          pct +
          `%\"></div></div>
              <div class="global-pct">${pct} % &nbsp;·&nbsp; ${stats.hours} h / ${TOTAL_HOURS} h</div>
            </div>

            <div class="stats">
              <div class="stat">
                <div class="stat-value">${stats.hours}<span style="font-size:.85rem;color:var(--muted)"> h</span></div>
                <div class="stat-label">Heures planifiées</div>
                ${stats.actualEntered > 0 ? `<div class="stat-sub">réel <b>${formatHours(stats.actual)} h</b> · ${stats.actualEntered}/${stats.total}</div>` : ""}
              </div>
              <div class="stat">
                <div class="stat-value">${stats.sessions}<span style="font-size:.85rem;color:var(--muted)"> / ${stats.total}</span></div>
                <div class="stat-label">Sessions</div>
              </div>
              <div class="stat">
                <div class="stat-value">${pct}<span style="font-size:.85rem;color:var(--muted)"> %</span></div>
                <div class="stat-label">Progression</div>
              </div>
              <div class="stat">
                <div class="stat-value">${curWeek}<span style="font-size:.85rem;color:var(--muted)"> / 20</span></div>
                <div class="stat-label">Semaine</div>
              </div>
            </div>

            <div class="indicator">
              <div>
                <div class="indicator-label">Indicateur sem. ${curWeek}</div>
                <div class="indicator-val ${deltaCls}">${stats.hours} h <span style="font-size:.75rem;color:var(--muted);font-weight:400">/ ${expected} h attendues</span></div>
              </div>
              <div class="indicator-msg ${deltaCls}">${deltaMsg}</div>
            </div>

            <div class="milestones-section">
              <div class="section-title">Jalons</div>
              <div class="milestones-row">
                ${PHASES.map((p) => {
                  const done = isPhaseComplete(p, state);
                  return `<div class="milestone ${done ? "done" : ""}">
                    <div class="m-dot">${done ? "✓" : p.milestone.num}</div>
                    <div class="m-label">${p.milestone.label}</div>
                    <div class="m-date">${p.milestone.date}</div>
                  </div>`;
                }).join("")}
              </div>
            </div>

            <div class="phases">
              ${(() => {
                const firstIncomplete = PHASES.findIndex(
                  (p) => !isPhaseComplete(p, state),
                );
                return PHASES.map((p, i) =>
                  renderPhase(p, state, i, firstIncomplete),
                ).join("");
              })()}
            </div>

            <div class="footer">
              <button class="btn-reset" onclick="resetAll()">Réinitialiser la progression</button>
              <div class="footer-note">Données stockées dans localStorage — aucun serveur</div>
            </div>
          `;

        // wire checkboxes
        document.querySelectorAll("input[data-sid]").forEach((cb) => {
          cb.addEventListener("change", (e) => {
            const s = load();
            const prevComplete = PHASES.map((p) => isPhaseComplete(p, s));
            s[e.target.dataset.sid] = e.target.checked;
            save(s);
            const newComplete = PHASES.map((p) => isPhaseComplete(p, s));
            if (newComplete.some((c, i) => c && !prevComplete[i])) confetti();
            render();
          });
        });

        // wire actual-hours inputs
        document.querySelectorAll("input[data-hid]").forEach((inp) => {
          inp.addEventListener("change", (e) => {
            const s = load();
            const raw = e.target.value.trim().replace(",", ".");
            const k = actualKey(e.target.dataset.hid);
            if (raw === "") {
              delete s[k];
            } else {
              const n = parseFloat(raw);
              if (!isFinite(n) || n < 0) {
                delete s[k];
              } else {
                s[k] = Math.round(n * 100) / 100;
              }
            }
            save(s);
            render();
          });
          inp.addEventListener("click", (e) => e.stopPropagation());
        });

        // wire phase toggles
        document.querySelectorAll(".phase-header").forEach((h) => {
          h.addEventListener("click", () =>
            h.closest(".phase").classList.toggle("open"),
          );
        });

        // wire week toggles
        document.querySelectorAll(".week-header").forEach((h) => {
          h.addEventListener("click", () =>
            h.closest(".week").classList.toggle("open"),
          );
        });

        // wire course-open anchors
        document.querySelectorAll("a[data-open-sid]").forEach((a) => {
          a.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            openCourse(a.dataset.openSid);
          });
        });
      }

      function renderPhase(phase, state, idx, firstIncompleteIdx) {
        const sessions = allSessions(phase);
        const done = sessions.filter((s) => state[s.id]).length;
        const total = sessions.length;
        const hoursD = sessions
          .filter((s) => state[s.id])
          .reduce((a, s) => a + s.hours, 0);
        const hoursT = sessions.reduce((a, s) => a + s.hours, 0);
        let actualSum = 0,
          actualCount = 0;
        for (const s of sessions) {
          const a = getActual(state, s.id);
          if (a !== null) {
            actualSum += a;
            actualCount++;
          }
        }
        const actualSuffix =
          actualCount > 0
            ? ` &nbsp;·&nbsp; réel ${formatHours(actualSum)} h`
            : "";
        const pct = total ? Math.round((done / total) * 100) : 0;
        const isOpen = idx === firstIncompleteIdx;

        return (
          `
            <div class="phase ${isOpen ? "open" : ""}">
              <div class="phase-header">
                <div class="phase-accent" style=\"background:` +
          phase.color +
          `\"></div>
                <div class="phase-info">
                  <div class="phase-name">${phase.name}</div>
                  <div class="phase-meta">${phase.dateRange} &nbsp;·&nbsp; ${done}/${total} sessions &nbsp;·&nbsp; ${hoursD} h / ${hoursT} h${actualSuffix}</div>
                </div>
                <div class="phase-prog-wrap">
                  <div class="phase-bar"><div class="phase-bar-fill" style=\"width:` +
          `${pct}%;background:${phase.color}` +
          `\"></div></div>
                  <div class="phase-pct">${pct} %</div>
                </div>
                <div class="phase-chevron">▼</div>
              </div>
              <div class="phase-body">
                ${phase.weeks.map((w) => renderWeek(w, state, phase.color)).join("")}
                ${renderMilestoneCard(phase, state)}
              </div>
            </div>
          `
        );
      }

      function isWeekComplete(week, state) {
        return week.sessions.every((s) => state[s.id]);
      }

      function renderWeek(week, state, color) {
        const open = !isWeekComplete(week, state); // finished weeks start collapsed
        return (
          `
            <div class="week${open ? " open" : ""}">
              <div class="week-header">
                <span class="week-num">Sem. ${week.num}</span>
                <span class="week-topic" style=\"color:` +
          color +
          `\">${week.topic}</span>
                <span class="week-dates">${week.dates}</span>
                <span class="week-chevron">▾</span>
              </div>
              <div class="week-body">
                ${week.sessions.map((s) => renderSession(s, state)).join("")}
              </div>
            </div>
          `
        );
      }

      function formatHours(h) {
        return Number.isInteger(h)
          ? String(h)
          : h.toFixed(2).replace(/\.?0+$/, "");
      }

      function hasCourse(sid) {
        const mods = COURSES[sid];
        return Array.isArray(mods) && mods.length > 0;
      }

      function renderSession(s, state) {
        const checked = !!state[s.id];
        const today = isToday(s.date);
        const actual = getActual(state, s.id);
        let actualCls = "";
        if (actual !== null) {
          if (actual > s.hours) actualCls = " over";
          else if (actual < s.hours) actualCls = " under";
        }
        const openBtn = hasCourse(s.id)
          ? `<a href="#" class="s-open" data-open-sid="${s.id}" title="Ouvrir le cours" aria-label="Ouvrir le cours">📖</a>`
          : "";
        return `
    <div class="session${checked ? " done" : ""}${today ? " today" : ""}" id="sess-${s.id}">
      <input type="checkbox" data-sid="${s.id}" ${checked ? "checked" : ""}>
      <div class="s-body">
        <div class="s-row1">
          <span class="s-day">${s.day}</span>
          ${today ? '<span class="s-today-badge">AUJOURD\'HUI</span>' : ""}
          <span class="s-hours">prévu ${s.hours} h</span>
          <span class="s-actual-label">réel</span>
          <input type="number" class="s-actual${actualCls}" data-hid="${s.id}"
                 min="0" step="0.25" placeholder="${s.hours}"
                 value="${actual !== null ? formatHours(actual) : ""}"
                 title="Heures réellement passées sur cette session">
        </div>
        <div class="s-label-row">${openBtn}<span class="s-label">${s.label}</span></div>
        <div class="s-details">${s.details}</div>
      </div>
    </div>
  `;
      }

      // ── Markdown renderer (minimal, sufficient for course files) ────────────────
      function mdEscape(s) {
        return s.replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      }
      function mdInline(s) {
        s = mdEscape(s);
        // code spans first (protect from other replacements)
        const codes = [];
        s = s.replace(/`([^`]+)`/g, (_, c) => {
          codes.push(c);
          return `\x00${codes.length - 1}\x00`;
        });
        s = s.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
        s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, "$1<em>$2</em>");
        // Underscore emphasis: only at word boundaries so snake_case is preserved.
        s = s.replace(/(^|[^\w])__([^_\n]+)__(?!\w)/g, "$1<strong>$2</strong>");
        s = s.replace(/(^|[^\w])_([^_\n]+)_(?!\w)/g, "$1<em>$2</em>");
        s = s.replace(
          /\[([^\]]+)\]\(([^)]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener">$1</a>',
        );
        s = s.replace(/\x00(\d+)\x00/g, (_, i) => `<code>${codes[+i]}</code>`);
        return s;
      }
      function renderMarkdown(md) {
        const lines = md.replace(/\r\n?/g, "\n").split("\n");
        const out = [];
        let para = [];
        let listStack = []; // [{type, indent}]
        let inCode = false,
          codeLang = "",
          codeBuf = [];
        let inTable = false,
          tableHead = null;

        const flushPara = () => {
          if (para.length) {
            out.push(`<p>${mdInline(para.join(" "))}</p>`);
            para = [];
          }
        };
        const closeLists = (toIndent = -1) => {
          while (
            listStack.length &&
            listStack[listStack.length - 1].indent > toIndent
          ) {
            out.push(listStack.pop().type === "ul" ? "</ul>" : "</ol>");
          }
        };
        const closeAllLists = () => closeLists(-1);
        const flushTable = () => {
          if (inTable) {
            out.push("</tbody></table>");
            inTable = false;
            tableHead = null;
          }
        };

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];

          // fenced code block
          const fence = line.match(/^```\s*(\S*)\s*$/);
          if (fence) {
            if (!inCode) {
              flushPara();
              closeAllLists();
              flushTable();
              inCode = true;
              codeLang = fence[1] || "";
              codeBuf = [];
            } else {
              out.push(
                `<pre><code${codeLang ? ` class="lang-${codeLang}"` : ""}>${mdEscape(codeBuf.join("\n"))}</code></pre>`,
              );
              inCode = false;
              codeBuf = [];
            }
            continue;
          }
          if (inCode) {
            codeBuf.push(line);
            continue;
          }

          // blank line
          if (/^\s*$/.test(line)) {
            flushPara();
            flushTable();
            continue;
          }

          // heading
          const h = line.match(/^(#{1,6})\s+(.*?)\s*#*\s*$/);
          if (h) {
            flushPara();
            closeAllLists();
            flushTable();
            out.push(`<h${h[1].length}>${mdInline(h[2])}</h${h[1].length}>`);
            continue;
          }

          // horizontal rule
          if (/^\s*([-*_])\s*\1\s*\1[\s\-*_]*$/.test(line) && !inTable) {
            flushPara();
            closeAllLists();
            out.push("<hr>");
            continue;
          }

          // table
          if (/^\s*\|.*\|\s*$/.test(line)) {
            const cells = line
              .trim()
              .slice(1, -1)
              .split("|")
              .map((c) => c.trim());
            const next = lines[i + 1] || "";
            if (
              !inTable &&
              /^\s*\|?\s*:?-+:?\s*(\|\s*:?-+:?\s*)+\|?\s*$/.test(next)
            ) {
              flushPara();
              closeAllLists();
              out.push(
                "<table><thead><tr>" +
                  cells.map((c) => `<th>${mdInline(c)}</th>`).join("") +
                  "</tr></thead><tbody>",
              );
              inTable = true;
              tableHead = cells.length;
              i++; // skip separator
              continue;
            }
            if (inTable) {
              out.push(
                "<tr>" +
                  cells.map((c) => `<td>${mdInline(c)}</td>`).join("") +
                  "</tr>",
              );
              continue;
            }
          } else {
            flushTable();
          }

          // list item
          const liU = line.match(/^(\s*)[-*+]\s+(.*)$/);
          const liO = line.match(/^(\s*)\d+\.\s+(.*)$/);
          if (liU || liO) {
            flushPara();
            const m = liU || liO;
            const indent = m[1].length;
            const type = liU ? "ul" : "ol";
            closeLists(indent);
            const top = listStack[listStack.length - 1];
            if (!top || top.indent < indent) {
              out.push(type === "ul" ? "<ul>" : "<ol>");
              listStack.push({ type, indent });
            } else if (top.type !== type) {
              out.push(top.type === "ul" ? "</ul>" : "</ol>");
              listStack.pop();
              out.push(type === "ul" ? "<ul>" : "<ol>");
              listStack.push({ type, indent });
            }
            out.push(`<li>${mdInline(m[2])}</li>`);
            continue;
          }

          // blockquote
          const bq = line.match(/^>\s?(.*)$/);
          if (bq) {
            flushPara();
            closeAllLists();
            out.push(`<blockquote>${mdInline(bq[1])}</blockquote>`);
            continue;
          }

          // paragraph (close lists if continuing at root indent)
          closeAllLists();
          para.push(line.trim());
        }

        flushPara();
        closeAllLists();
        flushTable();
        if (inCode)
          out.push(`<pre><code>${mdEscape(codeBuf.join("\n"))}</code></pre>`);
        return out.join("\n");
      }

      // ── Course modal (lazy-loaded markdown) ─────────────────────────────────────
      let _modalState = { sid: null, idx: 0, reqId: 0 };
      const _mdCache = new Map(); // path → markdown text

      async function fetchMarkdown(path) {
        if (_mdCache.has(path)) return _mdCache.get(path);
        const resp = await fetch(path);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const text = await resp.text();
        _mdCache.set(path, text);
        return text;
      }

      function openCourse(sid) {
        const mods = COURSES[sid] || [];
        if (!mods.length) return;
        _modalState = { sid, idx: 0, reqId: _modalState.reqId + 1 };
        const phase = PHASES.find((p) =>
          allSessions(p).some((s) => s.id === sid),
        );
        const session = phase
          ? allSessions(phase).find((s) => s.id === sid)
          : null;
        document.getElementById("course-modal-title").textContent = session
          ? `${session.day} — ${session.label}`
          : sid;
        renderModalTabs();
        loadModalBody();
        const m = document.getElementById("course-modal");
        m.classList.add("open");
        m.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }
      function closeCourse() {
        const m = document.getElementById("course-modal");
        m.classList.remove("open");
        m.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }
      function renderModalTabs() {
        const mods = COURSES[_modalState.sid] || [];
        const tabs = document.getElementById("course-modal-tabs");
        if (mods.length <= 1) {
          tabs.innerHTML = "";
          return;
        }
        tabs.innerHTML = mods
          .map(
            (m, i) =>
              `<button class="modal-tab${i === _modalState.idx ? " active" : ""}" data-tab="${i}">${m.title}</button>`,
          )
          .join("");
        tabs.querySelectorAll(".modal-tab").forEach((b) => {
          b.addEventListener("click", () => {
            _modalState.idx = parseInt(b.dataset.tab, 10);
            renderModalTabs();
            loadModalBody();
          });
        });
      }
      async function loadModalBody() {
        const mods = COURSES[_modalState.sid] || [];
        const mod = mods[_modalState.idx];
        const body = document.getElementById("course-modal-body");
        if (!mod) {
          body.innerHTML = "<em>Aucun contenu</em>";
          body.classList.add("empty");
          return;
        }
        const reqId = _modalState.reqId;
        body.classList.remove("empty");
        if (_mdCache.has(mod.path)) {
          body.innerHTML = renderMarkdown(_mdCache.get(mod.path));
          body.scrollTop = 0;
          return;
        }
        body.innerHTML = `<p style="color:var(--muted)">Chargement de <code>${mod.path}</code>…</p>`;
        try {
          const text = await fetchMarkdown(mod.path);
          if (reqId !== _modalState.reqId) return; // user moved on
          body.innerHTML = renderMarkdown(text);
          body.scrollTop = 0;
        } catch (err) {
          if (reqId !== _modalState.reqId) return;
          body.innerHTML = `
      <p style="color:#ef4444"><strong>Impossible de charger <code>${mod.path}</code></strong></p>
      <p style="color:var(--muted);font-size:.85rem">${err.message}</p>
      <p style="color:var(--muted);font-size:.8rem">
        Astuce&nbsp;: si vous ouvrez ce fichier via <code>file://</code>, les <code>fetch</code> locaux peuvent être bloqués par le navigateur.
        Servez le dossier avec <code>python -m http.server</code> puis ouvrez <code>http://localhost:8000/avancement.html</code>.
      </p>`;
        }
      }

      document.addEventListener("click", (e) => {
        if (e.target.closest("[data-modal-close]")) {
          closeCourse();
        }
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeCourse();
      });

      function renderMilestoneCard(phase, state) {
        const m = phase.milestone;
        const unlocked = isPhaseComplete(phase, state);
        return `
    <div class="phase-milestone ${unlocked ? "unlocked" : ""}">
      <div class="pm-icon">${unlocked ? "🏆" : "⬛"}</div>
      <div class="pm-info">
        <div class="pm-title">${m.label} — ${m.date}</div>
        <div class="pm-skills">${m.skills}</div>
      </div>
      <div class="pm-status">${unlocked ? "DÉBLOQUÉ ✓" : "Verrouillé"}</div>
    </div>
  `;
      }

      // Export the localStorage progress (key noledj_v1) as a downloadable JSON file.
      function exportProgress() {
        const payload = {
          app: "noledj",
          version: 1,
          exportedAt: new Date().toISOString(),
          progress: load(),
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], {
          type: "application/json",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `noledj-progress-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      // Import a JSON file (either the wrapped export or a raw state object) into localStorage.
      function importProgress(file) {
        const reader = new FileReader();
        reader.onload = () => {
          let data;
          try {
            data = JSON.parse(reader.result);
          } catch {
            alert("Fichier invalide : JSON illisible.");
            return;
          }
          const progress =
            data && typeof data.progress === "object" && data.progress
              ? data.progress
              : data && typeof data === "object"
                ? data
                : null;
          if (!progress) {
            alert("Fichier invalide : aucune progression trouvée.");
            return;
          }
          if (
            !confirm(
              "Remplacer la progression actuelle par le fichier importé ?",
            )
          )
            return;
          save(progress);
          render();
          alert("Progression importée ✓");
        };
        reader.onerror = () => alert("Erreur de lecture du fichier.");
        reader.readAsText(file);
      }

      // Wire the hidden file input once (it lives outside #app, so render() never touches it).
      document.getElementById("import-file").addEventListener("change", (e) => {
        const f = e.target.files[0];
        if (f) importProgress(f);
        e.target.value = ""; // reset so re-selecting the same file fires 'change' again
      });

      function resetAll() {
        const hasConfirmed = confirm(
          "Réinitialiser toute la progression ? Cette action est irréversible.",
        );
        if (hasConfirmed) {
          localStorage.removeItem(LS_KEY);
          render();
        }
      }

      // First session (in timeline order) not yet ticked — where the learner left off.
      function firstUncheckedSid(state) {
        for (const p of PHASES)
          for (const s of allSessions(p)) {
            if (!state[s.id]) return s.id;
          }
        return null;
      }

      render();
    </script>
  </body>
</html>
